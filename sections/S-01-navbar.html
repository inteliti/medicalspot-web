<style>
  /* ── NavBar ──────────────────────────────────────────────── */
  .ms-navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    width: 100%;
    height: 72px;
    display: flex;
    align-items: center;
    background-color: var(--ms-white);
    box-shadow: none;
    border-bottom: 1px solid transparent;
    transition:
      box-shadow var(--ms-duration-component, 200ms) var(--ms-ease-base, cubic-bezier(0.2,0,0.2,1)),
      border-color var(--ms-duration-component, 200ms) var(--ms-ease-base, cubic-bezier(0.2,0,0.2,1));
  }

  .ms-navbar.is-scrolled {
    box-shadow: var(--ms-shadow-md);
    border-bottom-color: var(--ms-border);
  }

  .ms-navbar__inner {
    width: 100%;
    max-width: var(--ms-container-main, 1200px);
    margin-inline: auto;
    padding-inline: var(--ms-container-padding, 24px);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── Logo ──────────────────────────────────────────────────── */
  .ms-navbar__logo-link {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
    text-decoration: none;
  }

  .ms-navbar__logo {
    height: 32px;
    width: auto;
    display: block;
  }

  /* ── CTA Button sm ─────────────────────────────────────────── */
  .ms-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--ms-space-3, 12px);
    font-family: var(--ms-font-family, 'Poppins', system-ui, sans-serif);
    font-weight: var(--ms-font-bold, 700);
    line-height: 1;
    border: none;
    border-radius: var(--ms-radius-pill, 999px);
    cursor: pointer;
    text-decoration: none;
    background-color: var(--ms-green, #00B366);
    color: var(--ms-white, #FEFEFF);
    transition: background-color var(--ms-duration-micro, 150ms) var(--ms-ease-base, cubic-bezier(0.2,0,0.2,1));
    white-space: nowrap;
  }

  .ms-btn--sm {
    padding: 10px 16px;
    font-size: var(--ms-text-small, 0.875rem); /* 14px — bold cumple WCAG AA */
    min-height: 44px; /* área táctil mínima */
    min-width: 44px;
  }

  .ms-btn:hover {
    background-color: var(--ms-green-600, #009A57);
  }

  .ms-btn:focus-visible {
    outline: none;
    box-shadow: var(--ms-shadow-focus, 0 0 0 3px rgba(0,179,102,0.25));
  }

  /* ── Mobile ≤ 767px ─────────────────────────────────────────── */
  @media (max-width: 767px) {
    .ms-navbar {
      height: 60px;
    }

    .ms-navbar__logo {
      height: 26px;
    }

    /* En viewports muy pequeños (≤ 360px), logo reduce a isotipo:
       si existe una versión de solo isotipo, reemplazar el src via JS.
       Regla: el CTA nunca desaparece aunque el logo se reduzca. */
    @media (max-width: 360px) {
      .ms-navbar__logo {
        height: 22px;
      }
    }
  }
</style>

<nav
  class="ms-navbar"
  role="navigation"
  aria-label="Navegación principal"
  id="navbar"
>
  <div class="ms-navbar__inner">

    <!-- Logo -->
    <a href="#" class="ms-navbar__logo-link" aria-label="MedicalSpot — ir al inicio">
      <img
        src="../assets/MedicalSpot_logo_color.svg"
        alt="MedicalSpot"
        class="ms-navbar__logo"
        width="160"
        height="32"
        loading="eager"
        fetchpriority="high"
      >
    </a>

    <!-- CTA único — variante sm -->
    <a
      href="#cta-final"
      class="ms-btn ms-btn--sm"
      role="button"
      aria-label="Agenda tu demo — abre formulario de agendamiento"
      data-cta="navbar"
    >
      Agenda tu demo
    </a>

  </div>
</nav>

<!-- JS: ver main.js → NavBar scroll
     Añade clase .is-scrolled al <nav#navbar> cuando window.scrollY supera 64px.
     Usa IntersectionObserver o scroll event listener con threshold en 64px.
     Transición de sombra es 200ms (controlada por CSS). -->
